<!DOCTYPE html>
<html>
<head>
    <title>Portfolio - AI Interviewer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="top-bar">
    <div class="nav-content" onclick="window.location.href='/';">
        <img src="/static/logo.png" class="nav-logo">
        <span class="brand-name">AI Interviewer</span>
    </div>
    <div class="nav-links">
        <a href="/" class="nav-link">Home</a>
        <a href="/quiz" class="nav-link">Technical Quiz</a>
        <a href="/portfolio_page" class="nav-link">Portfolio Analysis</a>
    </div>
</div>

<div class="container" id="chat-container" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);">
    <div style="text-align: center; margin-bottom: 30px;">
        <h2 style="font-size: 28px; margin-bottom: 10px;">Portfolio Intelligence</h2>
        <p style="opacity: 0.7;">Expert analysis of your technical profile and professional impact.</p>
    </div>

    <div id="portfolio-content">
        <div style="background: rgba(255,255,255,0.05); padding: 25px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);">
            <label style="display: block; margin-bottom: 10px; font-weight: bold; opacity: 0.9;">Portfolio Content</label>
            <textarea 
                id="portfolio-text" 
                placeholder="Describe your role, key projects, and the technical impact you made..."
                style="width: 100%; height: 250px; padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: white; font-family: inherit; font-size: 15px; line-height: 1.6; resize: vertical;"
            ></textarea>
            
            <div style="text-align: center; margin-top: 25px;">
                <button class="nextModule" onclick="analyzePortfolio()" style="width: 250px;">Generate Report ➜</button>
            </div>
        </div>
    </div>

    <div id="portfolio-results" style="display: none;">
        <div style="background: rgba(255,255,255,0.05); padding: 30px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <div>
                    <h3 style="font-size: 22px; margin: 0;">Analysis Report</h3>
                    <p id="report-date" style="font-size: 12px; opacity: 0.5; margin-top: 5px;"></p>
                </div>
                <div style="text-align: right;">
                    <div style="font-size: 32px; font-weight: bold; color: #1f8ef1;"><span id="portfolio-score">0</span><span style="font-size: 16px; opacity: 0.5;">/100</span></div>
                    <div style="font-size: 12px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7;">Strength Score</div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
                <div style="background: rgba(0,0,0,0.2); padding: 20px; border-radius: 12px;">
                    <h4 style="margin: 0 0 10px 0; font-size: 14px; opacity: 0.7;">Technical Core</h4>
                    <div id="skills-found" style="font-size: 15px; line-height: 1.5;"></div>
                </div>
                <div style="background: rgba(0,0,0,0.2); padding: 20px; border-radius: 12px;">
                    <h4 style="margin: 0 0 10px 0; font-size: 14px; opacity: 0.7;">Impact Velocity</h4>
                    <div id="impacts-found" style="font-size: 15px; line-height: 1.5;"></div>
                </div>
            </div>

            <div style="margin-bottom: 30px;">
                <h4 style="margin-bottom: 15px; font-size: 16px;">Strategic Feedback</h4>
                <ul id="portfolio-feedback-list" style="padding-left: 20px; line-height: 1.8; opacity: 0.9;"></ul>
            </div>

            <div style="text-align: center; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 30px; display: flex; justify-content: center; gap: 15px;">
                <button class="nextModule" style="background: #ba2ecc;" onclick="window.location.href='/quiz'">Take Technical Quiz ➜</button>
                <button class="nextModule" style="background: #555;" onclick="location.reload()">Reset Analysis</button>
            </div>
        </div>
    </div>
</div>

<div class="chat-input-bar">
    <button class="icon-btn next" title="Back to Interview" onclick="window.location.href='/';">🏠</button>
</div>

<script>
    function analyzePortfolio() {
        const text = document.getElementById("portfolio-text").value;
        if (!text.trim()) {
            alert("Please paste some text first!");
            return;
        }

        const btn = document.querySelector(".nextModule");
        btn.innerText = "Analyzing...";
        btn.disabled = true;

        fetch("/analyze-portfolio", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ portfolio_text: text })
        })
        .then(res => res.json())
        .then(data => {
            if (data.error) {
                alert(data.error);
                return;
            }

            document.getElementById("portfolio-content").style.display = "none";
            document.getElementById("portfolio-results").style.display = "block";
            
            document.getElementById("portfolio-score").innerText = data.score;
            document.getElementById("skills-found").innerText = data.skills.length > 0 ? data.skills.join(", ") : "None detected";
            document.getElementById("impacts-found").innerText = data.impacts.length > 0 ? data.impacts.join(", ") : "None detected";
            document.getElementById("tone-score").innerText = data.tone;

            const feedbackList = document.getElementById("portfolio-feedback-list");
            feedbackList.innerHTML = "";
            if (data.feedback.length === 0) {
                const li = document.createElement("li");
                li.innerText = "Great job! Your portfolio looks strong and professional.";
                feedbackList.appendChild(li);
            } else {
                data.feedback.forEach(item => {
                    const li = document.createElement("li");
                    li.innerText = item;
                    feedbackList.appendChild(li);
                });
            }
        })
        .catch(err => {
            console.error("Analysis error:", err);
            alert("An error occurred during analysis.");
        })
        .finally(() => {
            btn.innerText = "Analyze Portfolio ➜";
            btn.disabled = false;
        });
    }
</script>

</body>
</html>
